name: Release

on:
  push:
    tags:
      - "v*"
  pull_request:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit
        run: bun audit

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: [audit]
    permissions:
      contents: read
      id-token: write
      packages: write
    strategy:
      fail-fast: false
      matrix:
        registry: [npm, github]
        include:
          - registry: npm
            registry-url: https://registry.npmjs.org
          - registry: github
            registry-url: https://npm.pkg.github.com
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          registries: ${{ matrix.registry == 'github' && format('@kjanat:{0}|$GITHUB_TOKEN', matrix.registry-url) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup publishing context
        id: context
        uses: ./.github/actions/setup-context
        with:
          package: "@kjanat/prettier-config"
          registry-url: ${{ matrix.registry-url }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        if: steps.context.outputs.should-publish == 'true'
        run: bun install --frozen-lockfile

      - name: Setup Node (npm OIDC trusted publishing)
        if: matrix.registry == 'npm' && steps.context.outputs.should-publish == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: latest
          registry-url: https://registry.npmjs.org

      - name: Publish to npm registry${{ github.event_name != 'push' && ' (dry run)' || '' }}
        if: matrix.registry == 'npm' && steps.context.outputs.should-publish == 'true'
        run: npm publish --access public ${{ github.event_name != 'push' && '--dry-run' || '' }}

      - name: Publish to GitHub Packages registry${{ github.event_name != 'push' && ' (dry run)' || '' }}
        if: matrix.registry == 'github' && steps.context.outputs.should-publish == 'true'
        run: bun publish --access public --registry ${{ matrix.registry-url }} ${{ github.event_name != 'push' && '--dry-run' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publishing skipped
        if: steps.context.outputs.should-publish != 'true'
        run: |
          if [[ "${{ steps.context.outputs.is-tag }}" == "true" ]]; then
            echo "⏭️ Version ${{ steps.context.outputs.tag-version }} already published to ${{ matrix.registry }}"
          else
            echo "ℹ️ Not a version tag - skipping ${{ matrix.registry }} publish"
          fi
